<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

const COLS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

const SHOP_ITEMS = [
  { id:'emp',     name:'EMP',                cost:1, desc:"Blocks opponent's next turn; you get an extra move immediately." },
  { id:'shield',  name:'Shield',             cost:1, desc:"Protect one territory tile. If the enemy searches it, they see a miss instead." },
  { id:'pirates', name:'Pirates',            cost:3, desc:"Steal 1 territory tile from the opponent. If they have only 1 tile, they lose." },
  { id:'laser',   name:'Laser Ablation',     cost:2, desc:"Destroys any tile on either grid. 2 uses per game. Wasted on empty tiles." },
  { id:'station', name:'Space Station',      cost:3, desc:"Place 1 station tile (cyan) anywhere on your grid. Collecting adjacent CRs works same as expanding. Max 7 station tiles total. When attacked, station size defends vs attacker territory — losing station tiles doesn't end the game." },
  { id:'addroot', name:'Add Root',            cost:4, desc:"Add an extra root to any territory or station tile — that tile becomes an additional starting point. Both the old root and the new one anchor your territory. Tiles connected to either root are safe. (If you root onto a station tile it leaves the station pool.)" },
  { id:'torpedo', name:'Antimatter Torpedo', cost:7, desc:"3x3 blast. Center hits territory = instant win. Outer ring destroys what it hits." },
  { id:'probe',   name:'Resource Probe',    cost:4, desc:"Reveals 3 resource coordinates on the opponent's grid: one BR (or SR if no BR), one SR, and one CR (or SR if no BR). Using any item costs 1 move." },
];

// ── Helpers ──────────────────────────────────────────────────────────────────

function inBounds(r,c){ return r>=0&&r<12&&c>=0&&c<12; }

function ortho(r,c){
  return [[-1,0],[1,0],[0,-1],[0,1]].map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>inBounds(nr,nc));
}

function allAdj(r,c){
  const out=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++)
    if((dr||dc)&&inBounds(r+dr,c+dc)) out.push([r+dr,c+dc]);
  return out;
}

function mkCell(type='empty'){ return {type,collected:false,opponentSearched:false}; }
function cloneGrid(g){ return g.map(row=>row.map(c=>({...c}))); }

// ── Grid Generation ──────────────────────────────────────────────────────────

function generateGrid(){
  const grid = Array.from({length:12},()=>Array.from({length:12},()=>mkCell()));

  // Starting square: not within 2 of edge → indices 2–9
  const ssR = 2 + Math.floor(Math.random()*8);
  const ssC = 2 + Math.floor(Math.random()*8);
  grid[ssR][ssC] = mkCell('starting');

  const inExcl = (r,c) => Math.abs(r-ssR)<=1 && Math.abs(c-ssC)<=1;
  const adjTypes = (r,c,types) => allAdj(r,c).some(([nr,nc])=>types.includes(grid[nr][nc].type));

  // 20 CRs — no two adjacent to each other
  let placed=0, tries=0;
  while(placed<20 && tries<200000){
    tries++;
    const r=Math.floor(Math.random()*12), c=Math.floor(Math.random()*12);
    if(grid[r][c].type!=='empty') continue;
    if(inExcl(r,c)) continue;
    if(adjTypes(r,c,['cr'])) continue;
    grid[r][c]=mkCell('cr');
    placed++;
  }

  const adjTerOrCR = (r,c) => allAdj(r,c).some(([nr,nc])=>['starting','territory','cr'].includes(grid[nr][nc].type));

  // 2 BRs
  placed=0; tries=0;
  while(placed<2 && tries<200000){
    tries++;
    const r=Math.floor(Math.random()*12), c=Math.floor(Math.random()*12);
    if(grid[r][c].type!=='empty') continue;
    if(inExcl(r,c)) continue;
    if(adjTerOrCR(r,c)) continue;
    grid[r][c]=mkCell('br');
    placed++;
  }

  // 12 SRs
  placed=0; tries=0;
  while(placed<12 && tries<200000){
    tries++;
    const r=Math.floor(Math.random()*12), c=Math.floor(Math.random()*12);
    if(grid[r][c].type!=='empty') continue;
    if(inExcl(r,c)) continue;
    if(adjTerOrCR(r,c)) continue;
    grid[r][c]=mkCell('sr_res');
    placed++;
  }

  return {grid,ssR,ssC};
}

// ── Coordinate Parsing ───────────────────────────────────────────────────────

function parseCoord(input){
  const m=(input||'').trim().toUpperCase().match(/^([A-L])(\d{1,2})$/);
  if(!m) return null;
  const col=m[1].charCodeAt(0)-65;
  const row=parseInt(m[2])-1;
  if(row<0||row>11) return null;
  return {row,col};
}

// ── Placement Helpers ─────────────────────────────────────────────────────────

function validPlacements(grid){
  const s=new Set();
  for(let r=0;r<12;r++) for(let c=0;c<12;c++){
    const t=grid[r][c].type;
    if(t==='territory'||t==='starting'){
      ortho(r,c).forEach(([nr,nc])=>{
        const nc_=grid[nr][nc];
        if(nc_.type==='empty'||(nc_.type==='cr'&&nc_.collected))
          s.add(`${nr},${nc}`);
      });
    }
  }
  return s;
}

function autoExpandCRs(grid){
  const found=new Set();
  for(let r=0;r<12;r++) for(let c=0;c<12;c++){
    const t=grid[r][c].type;
    if(t==='territory'||t==='starting'||t==='station'){
      ortho(r,c).forEach(([nr,nc])=>{
        const nc_=grid[nr][nc];
        if(nc_.type==='cr'&&!nc_.collected) found.add(`${nr},${nc}`);
      });
    }
  }
  return [...found].map(k=>k.split(',').map(Number));
}

function countStation(grid){
  let n=0;
  for(let r=0;r<12;r++) for(let c=0;c<12;c++) if(grid[r][c].type==='station') n++;
  return n;
}

// BFS from starting tile; any territory tile NOT reachable is pruned.
// Station tiles are always exempt from pruning.
function pruneDisconnected(grid,ssR,ssC){
  const visited=new Set();
  const queue=[];
  // Seed BFS from ALL starting tiles so multiple roots are all treated as anchors
  for(let r=0;r<12;r++) for(let c=0;c<12;c++){
    if(grid[r][c].type==='starting'){const k=`${r},${c}`;if(!visited.has(k)){visited.add(k);queue.push([r,c]);}}
  }
  // Fallback in case grid has no starting tile yet
  if(!queue.length){const k=`${ssR},${ssC}`;visited.add(k);queue.push([ssR,ssC]);}
  while(queue.length){
    const [r,c]=queue.shift();
    for(const [nr,nc] of ortho(r,c)){
      const key=`${nr},${nc}`;
      if(visited.has(key)) continue;
      const t=grid[nr][nc].type;
      if(t==='territory'||t==='starting'){ visited.add(key); queue.push([nr,nc]); }
    }
  }
  let removed=0;
  const g=cloneGrid(grid);
  for(let r=0;r<12;r++) for(let c=0;c<12;c++){
    if(g[r][c].type==='territory'&&!visited.has(`${r},${c}`)){
      g[r][c]=mkCell('empty'); removed++;
    }
  }
  return {grid:g,removed};
}

// ── AI Helpers ────────────────────────────────────────────────────────────────

function autoPlaceAiTerritory(grid,count){
  let g=cloneGrid(grid);
  let remaining=count;
  while(remaining>0){
    const vp=validPlacements(g);
    const options=[...vp].map(k=>k.split(',').map(Number));
    if(!options.length) break;
    const [r,c]=options[Math.floor(Math.random()*options.length)];
    g[r][c]={...g[r][c],type:'territory',collected:false};
    const toCollect=autoExpandCRs(g);
    toCollect.forEach(([cr,cc])=>{g[cr][cc]={...g[cr][cc],collected:true};});
    remaining=remaining-1+toCollect.length;
  }
  return g;
}

function applyAiSearch(state,row,col,destroy=false){
  const isShielded=(state.shieldedCells||[]).some(s=>s.r===row&&s.c===col);
  if(isShielded){
    const newHG=state.aiHitGrid.map(r=>[...r]);
    newHG[row][col]={result:'miss'};
    const newShielded=state.shieldedCells.filter(s=>!(s.r===row&&s.c===col));
    return {state:{...state,aiHitGrid:newHG,shieldedCells:newShielded},result:'miss',msg:`Searched ${COLS[col]}${row+1} — Miss.`};
  }
  const cell=state.yourGrid[row][col];
  const result=
    cell.type==='cr'&&!cell.collected?'cr':
    cell.type==='br'&&!cell.collected?'br':
    cell.type==='sr_res'&&!cell.collected?'sr':
    (cell.type==='starting'||cell.type==='territory')?'territory':
    cell.type==='station'?'station':'miss';
  const newHG=state.aiHitGrid.map(r=>[...r]);
  newHG[row][col]={result};
  const newYG=cloneGrid(state.yourGrid);
  if(result==='cr'||result==='br'||result==='sr')
    newYG[row][col]={...newYG[row][col],collected:true};
  let territory=state.territory;
  if(destroy&&result==='territory'&&cell.type!=='starting'){
    newYG[row][col]=mkCell('empty');
    territory=Math.max(0,territory-1);
    const {grid:pruned,removed}=pruneDisconnected(newYG,state.ssR,state.ssC);
    for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++) newYG[pr][pc]=pruned[pr][pc];
    territory=Math.max(0,territory-removed);
  }
  if(destroy&&result==='station'){
    newYG[row][col]=mkCell('empty'); // station loss doesn't affect territory count
  }
  let {aiTerritory,aiSr,aiOwnGrid}=state;
  if(result==='cr'){aiTerritory++;aiOwnGrid=autoPlaceAiTerritory(aiOwnGrid,1);}
  else if(result==='br'){aiTerritory+=5;aiOwnGrid=autoPlaceAiTerritory(aiOwnGrid,5);}
  else if(result==='sr'){aiSr++;}
  const aiDominated=aiTerritory>=21;
  const msg=result==='miss'?`Searched ${COLS[col]}${row+1} — Miss.`:
    result==='cr'?`CR found at ${COLS[col]}${row+1}! Placed 1 territory.`:
    result==='br'?`BR found at ${COLS[col]}${row+1}! Placed 5 territory.`:
    result==='sr'?`SR found at ${COLS[col]}${row+1}! SR +1.`:
    `Hit your territory at ${COLS[col]}${row+1}!`;
  const newState={...state,aiHitGrid:newHG,yourGrid:newYG,aiTerritory,aiSr,aiOwnGrid,territory};
  if(aiDominated) return {state:{...newState,gameOver:true,winner:'ai'},result,msg};
  return {state:newState,result,msg};
}

function pickAiTarget(state){
  const {aiDifficulty,aiHitGrid,aiTargetQueue}=state;
  if(aiDifficulty!=='easy'){
    for(const [r,c] of aiTargetQueue)
      if(aiHitGrid[r][c]===null) return [r,c];
  }
  if(aiDifficulty==='hard'){
    const pool=[];
    for(let r=0;r<12;r++) for(let c=0;c<12;c++)
      if(aiHitGrid[r][c]===null&&(r+c)%2===0) pool.push([r,c]);
    if(pool.length) return pool[Math.floor(Math.random()*pool.length)];
  }
  const pool=[];
  for(let r=0;r<12;r++) for(let c=0;c<12;c++)
    if(aiHitGrid[r][c]===null) pool.push([r,c]);
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}

function doAiItems(state){
  if(state.aiDifficulty==='easy') return {state,logs:[]};
  let s=state;
  const logs=[];

  // Buy one item per turn
  let bought=null;
  if(s.aiDifficulty==='medium'){
    for(const id of ['pirates','emp']){
      const item=SHOP_ITEMS.find(i=>i.id===id);
      if(s.aiSr>=item.cost){bought=item;break;}
    }
  } else {
    for(const id of ['torpedo','pirates','laser','emp']){
      const item=SHOP_ITEMS.find(i=>i.id===id);
      if(s.aiSr>=item.cost){bought=item;break;}
    }
  }
  if(bought) s={...s,aiSr:s.aiSr-bought.cost,aiInventory:[...s.aiInventory,{...bought,iid:Date.now()+Math.random()}]};

  // Use all items in inventory
  const toUse=[...s.aiInventory];
  s={...s,aiInventory:[]};
  for(const item of toUse){
    if(item.id==='emp'){
      s={...s,playerStunned:true};
      logs.push({who:'ai',text:'Used EMP — your next turn is stunned!'});
    } else if(item.id==='pirates'){
      const t=Math.max(0,s.territory-1);
      s={...s,territory:t,gameOver:t===0||s.gameOver,winner:t===0?'ai':s.winner};
      logs.push({who:'ai',text:`Used Pirates — stole 1 territory tile. Your territory: ${t}${t===0?' — YOU LOSE!':''}`});
      if(t===0) return {state:s,logs};
    } else if(item.id==='laser'){
      const tgt=pickAiTarget(s);
      if(tgt){
        const aiBase=`${COLS[s.aiSsC]}${s.aiSsR+1}`;
        const {state:ns,msg}=applyAiSearch(s,tgt[0],tgt[1],true);
        s=ns;
        logs.push({who:'ai',text:`Laser from ${aiBase}: ${msg}`});
      }
    } else if(item.id==='torpedo'){
      const centers=[];
      for(let r=1;r<11;r++) for(let c=1;c<11;c++){
        let cnt=0;
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++)
          if(s.aiHitGrid[r+dr][c+dc]===null) cnt++;
        if(cnt>0) centers.push({r,c,cnt});
      }
      if(centers.length){
        centers.sort((a,b)=>b.cnt-a.cnt);
        const {r:cr,c:cc}=centers[0];
        const aiBase=`${COLS[s.aiSsC]}${s.aiSsR+1}`;
        // Center cell: if it hits territory/starting → instant win
        if(s.aiHitGrid[cr][cc]===null){
          const centerCell=s.yourGrid[cr][cc];
          if(centerCell.type==='territory'||centerCell.type==='starting'){
            const newHG=s.aiHitGrid.map(r=>[...r]);
            newHG[cr][cc]={result:'territory'};
            s={...s,aiHitGrid:newHG,gameOver:true,winner:'ai'};
            logs.push({who:'ai',text:`Torpedo from ${aiBase} — center hit at ${COLS[cc]}${cr+1}! Game over.`});
            return {state:s,logs};
          }
        }
        const hits=[];
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
          const tr=cr+dr,tc=cc+dc;
          const isCenter=dr===0&&dc===0;
          if(!inBounds(tr,tc)||s.aiHitGrid[tr][tc]!==null) continue;
          const {state:ns,result}=applyAiSearch(s,tr,tc,!isCenter);
          s=ns;
          if(result!=='miss') hits.push(`${COLS[tc]}${tr+1}`);
        }
        logs.push({who:'ai',text:`Torpedo from ${aiBase} at ${COLS[cc]}${cr+1}! Hits: ${hits.length?hits.join(', '):'none'}.`});
      }
    }
  }
  return {state:s,logs};
}

function doAiMove(prev){
  if(prev.aiStunned){
    return {...prev,aiStunned:false,turn:'you',
      log:[{who:'ai',text:'AI was stunned by EMP — turn skipped.'},...prev.log],
      pendingToast:{text:'AI stunned — turn skipped!',color:'#ffaa00'}};
  }
  const {state:s1,logs:itemLogs}=doAiItems(prev);
  if(s1.gameOver) return {...s1,turn:'you',log:[...itemLogs,...prev.log],pendingToast:{text:'AI wins! Game over.',color:'#cc4444'}};
  const target=pickAiTarget(s1);
  if(!target) return {...s1,turn:'you',log:[...itemLogs,...prev.log]};
  const {state:s2,result,msg}=applyAiSearch(s1,target[0],target[1]);
  if(s2.gameOver) return {...s2,turn:'you',log:[{who:'ai',text:msg},...itemLogs,...prev.log],pendingToast:{text:'AI reaches 21 tiles — domination! You lose.',color:'#cc4444'}};
  let aiTargetQueue=s2.aiTargetQueue;
  if(s2.aiDifficulty!=='easy'){
    aiTargetQueue=aiTargetQueue.filter(([r,c])=>s2.aiHitGrid[r][c]===null);
    if(result!=='miss'){
      const ex=new Set(aiTargetQueue.map(([r,c])=>`${r},${c}`));
      for(const [nr,nc] of ortho(target[0],target[1]))
        if(s2.aiHitGrid[nr][nc]===null&&!ex.has(`${nr},${nc}`))
          aiTargetQueue.push([nr,nc]);
    }
  }
  const aiColor=result==='miss'?'#554433':result==='cr'?'#cc6633':result==='br'?'#cc3333':result==='sr'?'#5555aa':'#cc8833';
  return {...s2,aiTargetQueue,turn:'you',log:[{who:'ai',text:msg},...itemLogs,...prev.log],pendingToast:{text:'AI made a move.',color:'#554433'}};
}

// ── PvP Swap ──────────────────────────────────────────────────────────────────

function swapPvpPlayers(prev){
  const {p2}=prev;
  const snap={
    yourGrid:prev.yourGrid,
    opponentGrid:prev.opponentGrid,
    hitGrid:prev.hitGrid,
    ssR:prev.ssR,ssC:prev.ssC,
    territory:prev.territory,
    sr:prev.sr,
    inventory:prev.inventory,
    selectedItem:prev.selectedItem,
    placementMode:prev.placementMode,
    placementRemaining:prev.placementRemaining,
    stationMode:false,rerootMode:false,
    shieldMode:false,shieldedCells:prev.shieldedCells,
  };
  return {
    ...prev,
    yourGrid:p2.yourGrid,
    opponentGrid:p2.opponentGrid,
    hitGrid:p2.hitGrid,
    ssR:p2.ssR,ssC:p2.ssC,
    territory:p2.territory,
    sr:p2.sr,
    inventory:p2.inventory,
    selectedItem:p2.selectedItem,
    placementMode:p2.placementMode,
    placementRemaining:p2.placementRemaining,
    stationMode:p2.stationMode||false,
    rerootMode:p2.rerootMode||false,
    shieldMode:p2.shieldMode||false,
    shieldedCells:p2.shieldedCells||[],
    p2:snap,
    activeAction:null,actionInput:'',actionError:'',actionMessage:'',
    activePlayer:prev.activePlayer===1?2:1,
    pvpPendingPass:false,
    playerStunned:prev.opponentStunned,
    opponentStunned:false,
    turn:'you',
    viewMode:p2.placementMode?'your':'hit',
  };
}

// ── Initial State ─────────────────────────────────────────────────────────────

function initGame(mode=false){
  const {grid,ssR,ssC}=generateGrid();
  const pvpMode=mode==='1v1';
  const aiOn=!!mode&&!pvpMode;
  const {grid:opponentGrid,ssR:opponentSsR,ssC:opponentSsC}=generateGrid();
  const {grid:aiOwnGrid,ssR:aiSsR,ssC:aiSsC}=generateGrid();
  let p2=null;
  if(pvpMode){
    const {grid:p2Grid,ssR:p2SsR,ssC:p2SsC}=generateGrid();
    p2={
      yourGrid:p2Grid,
      opponentGrid:grid.map(r=>r.map(c=>({...c}))),
      hitGrid:Array.from({length:12},()=>Array(12).fill(null)),
      ssR:p2SsR,ssC:p2SsC,
      territory:1,sr:0,inventory:[],selectedItem:null,
      placementMode:false,placementRemaining:0,
      stationMode:false,rerootMode:false,
      shieldMode:false,shieldedCells:[],
    };
  }
  return {
    yourGrid: grid,
    opponentGrid: pvpMode?p2.yourGrid:opponentGrid,
    hitGrid: Array.from({length:12},()=>Array(12).fill(null)),
    viewMode: 'your',
    territory: 1,
    sr: 0,
    inventory: [],
    placementMode: false,
    placementRemaining: 0,
    activeAction: null,
    actionInput: '',
    actionError: '',
    actionMessage: '',
    shopOpen: false,
    selectedItem: null,
    ssR, ssC, opponentSsR, opponentSsC, aiSsR, aiSsC,
    log: [],
    aiMode: aiOn, aiDifficulty: aiOn?mode:null,
    turn: 'you',
    aiHitGrid: Array.from({length:12},()=>Array(12).fill(null)),
    aiTerritory: 1,
    aiSr: 0,
    aiOwnGrid, aiInventory: [], aiTargetQueue: [],
    aiStunned: false, playerStunned: false,
    stationMode: false, rerootMode: false,
    pendingToast: null,
    gameOver: false, winner: null,
    shieldedCells: [], shieldMode: false,
    pvpMode, activePlayer: pvpMode?1:null, p2, pvpPendingPass: false, opponentStunned: false,
  };
}

// ── App ───────────────────────────────────────────────────────────────────────

function App(){
  const [phase,setPhase]=useState('start');
  const [pendingDiff,setPendingDiff]=useState(null);
  const [gs,setGs]=useState(()=>initGame());
  const inputRef=useRef(null);
  const [hoverCell,setHoverCell]=useState(null);
  const [notes,setNotes]=useState('');
  const [toasts,setToasts]=useState([]);
  const [timeLeft,setTimeLeft]=useState(120);
  const timerRef=useRef(null);
  const [pvpLoading,setPvpLoading]=useState(false);
  const [pvpCountdown,setPvpCountdown]=useState(5);
  const pvpCountRef=useRef(null);

  const addToast=useCallback((text,color='#aaaacc')=>{
    const id=Date.now()+Math.random();
    setToasts(prev=>[...prev,{id,text,color}]);
    setTimeout(()=>setToasts(prev=>prev.filter(t=>t.id!==id)),2600);
  },[]);

  const startGame=useCallback((aiMode)=>{
    setGs(initGame(aiMode));
    setPhase('game');
  },[]);

  const chooseAi=useCallback((diff)=>{
    setPendingDiff(diff);
    setPhase('loading');
    setTimeout(()=>{
      setGs(initGame(diff));
      setPhase('game');
    },550);
  },[]);

  const startPvp=useCallback(()=>{
    setPhase('loading');
    setTimeout(()=>{
      setGs(initGame('1v1'));
      setPhase('game');
    },550);
  },[]);

  const passPvp=useCallback(()=>{
    setPvpLoading(true);
    setPvpCountdown(5);
    pvpCountRef.current=setInterval(()=>{
      setPvpCountdown(prev=>{
        if(prev<=1){
          clearInterval(pvpCountRef.current);
          setGs(g=>swapPvpPlayers(g));
          setPvpLoading(false);
          return 5;
        }
        return prev-1;
      });
    },1000);
  },[]);

  useEffect(()=>{
    if(!gs.pendingToast) return;
    addToast(gs.pendingToast.text,gs.pendingToast.color);
    setGs(prev=>({...prev,pendingToast:null}));
  },[gs.pendingToast]);

  useEffect(()=>{
    if(gs.activeAction && inputRef.current) inputRef.current.focus();
  },[gs.activeAction]);

  useEffect(()=>{
    if(!gs.aiMode||gs.turn!=='ai'||gs.gameOver) return;
    const t=setTimeout(()=>setGs(prev=>doAiMove(prev)),5000);
    return ()=>clearTimeout(t);
  },[gs.turn,gs.aiMode,gs.gameOver]);

  useEffect(()=>{
    clearInterval(timerRef.current);
    if(phase!=='game'||gs.turn!=='you'||gs.gameOver||gs.pvpMode) return;
    setTimeLeft(120);
    timerRef.current=setInterval(()=>{
      setTimeLeft(prev=>{
        if(prev<=1){
          clearInterval(timerRef.current);
          setGs(g=>{
            if(g.gameOver||g.turn!=='you') return g;
            return {...g,gameOver:true,winner:'ai',
              log:[{who:'you',text:'Time ran out!'},...g.log],
              pendingToast:{text:'Time ran out — you lose!',color:'#cc4444'}};
          });
          return 0;
        }
        return prev-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[gs.turn,gs.gameOver,phase,gs.pvpMode]);

  // Place a territory tile
  const placeTile=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.placementMode||prev.placementRemaining<=0) return prev;
      if(prev.aiMode&&prev.turn==='ai') return prev;
      const vp=validPlacements(prev.yourGrid);
      if(!vp.has(`${r},${c}`)) return prev;

      const g=cloneGrid(prev.yourGrid);
      g[r][c]={...g[r][c],type:'territory',collected:false};

      // Auto-expand: collect adjacent uncollected CRs
      const toCollect=autoExpandCRs(g);
      toCollect.forEach(([cr,cc])=>{ g[cr][cc]={...g[cr][cc],collected:true}; });

      const remaining=prev.placementRemaining-1+toCollect.length;
      const newTerritory=prev.territory+1;
      const toastText=remaining>0?`Territory placed! ${remaining} tile${remaining!==1?'s':''} left.`:'All territory placed!';
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2OppGrid=prev.p2.opponentGrid.map(row=>row.map(c=>({...c})));
        if(!p2OppGrid[r][c].collected) p2OppGrid[r][c]={...p2OppGrid[r][c],type:'territory'};
        toCollect.forEach(([cr,cc])=>{
          if(p2OppGrid[cr][cc].type==='cr'&&!p2OppGrid[cr][cc].collected)
            p2OppGrid[cr][cc]={...p2OppGrid[cr][cc],collected:true};
        });
        newP2={...prev.p2,opponentGrid:p2OppGrid};
      }
      // Domination win: reaching 21 territory tiles wins the game
      if(newTerritory>=21){
        const winWho=prev.pvpMode?`p${prev.activePlayer}`:'you';
        return {
          ...prev,
          yourGrid: g,
          territory: newTerritory,
          placementMode: false,
          placementRemaining: 0,
          p2: newP2,
          gameOver: true,
          winner: winWho,
          log:[{who:winWho,text:`Reached 21 territory tiles — DOMINATION! ${prev.pvpMode?`Player ${prev.activePlayer} wins!`:'YOU WIN!'}`},...prev.log],
          pendingToast:{text:`21 tiles reached — DOMINATION! ${prev.pvpMode?`Player ${prev.activePlayer} wins!`:'YOU WIN!'}`,color:'#44ff44'},
        };
      }
      return {
        ...prev,
        yourGrid: g,
        territory: newTerritory,
        placementMode: remaining>0,
        placementRemaining: remaining,
        viewMode: remaining>0?'your':prev.viewMode,
        pendingToast:{text:toastText,color:'#3aacac'},
        p2: newP2,
        pvpPendingPass: prev.pvpMode&&remaining===0,
        // In AI mode, hand turn to AI only once all tiles have been placed
        turn: prev.aiMode&&remaining===0?'ai':'you',
      };
    });
  },[]);

  // Search
  const submitSearch=useCallback(()=>{
    setGs(prev=>{
      if(prev.playerStunned){
        return {...prev,playerStunned:false,activeAction:null,actionInput:'',actionError:'',
          turn:prev.aiMode?'ai':'you',
          pvpPendingPass:prev.pvpMode,
          log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:'Stunned by EMP — turn lost!'},...prev.log],
          pendingToast:{text:'Stunned! Turn lost.',color:'#ff6600'}};
      }
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12 (e.g. D4)'};
      const {row,col}=coord;
      if(prev.pvpMode){
        const shielded=(prev.p2?.shieldedCells||[]).some(s=>s.r===row&&s.c===col);
        if(shielded){
          const newHit=prev.hitGrid.map(r=>[...r]);
          newHit[row][col]={result:'miss'};
          const newP2={...prev.p2,shieldedCells:prev.p2.shieldedCells.filter(s=>!(s.r===row&&s.c===col))};
          const msg=`Searched ${COLS[col]}${row+1} — Miss (shielded).`;
          return {...prev,hitGrid:newHit,p2:newP2,activeAction:null,actionInput:'',actionError:'',
            pvpPendingPass:true,
            log:[{who:`p${prev.activePlayer}`,text:msg},...prev.log],
            pendingToast:{text:'Shielded! That tile was protected.',color:'#55aaff'}};
        }
      }
      if(prev.hitGrid[row][col]!==null)
        return {...prev,actionError:`${COLS[col]}${row+1} already searched.`};

      const newHit=prev.hitGrid.map(r=>[...r]);
      const oppCell=prev.opponentGrid[row][col];
      const result=oppCell.type==='cr'?'cr':oppCell.type==='br'?'br':oppCell.type==='sr_res'?'sr':(oppCell.type==='starting'||oppCell.type==='territory'||oppCell.type==='station')?'territory':'miss';
      newHit[row][col]={result};

      // Deplete the resource in opponentGrid so future logic sees it as empty
      const newOppGrid=prev.opponentGrid.map(r=>[...r]);
      if(result==='cr'||result==='br'||result==='sr')
        newOppGrid[row][col]={...newOppGrid[row][col],type:'empty',collected:true};

      let {sr,yourGrid,placementMode,placementRemaining}=prev;
      let msg=`Searched ${COLS[col]}${row+1} — Miss.`;

      if(result==='cr'){ placementMode=true; placementRemaining+=1; msg=`CR found at ${COLS[col]}${row+1}! Place 1 territory tile.`; }
      if(result==='br'){ placementMode=true; placementRemaining+=5; msg=`BR found at ${COLS[col]}${row+1}! Place 5 territory tiles.`; }
      if(result==='sr'){ sr+=1; msg=`SR found at ${COLS[col]}${row+1}! SR +1.`; }
      if(result==='territory'){ msg=`Hit opponent territory at ${COLS[col]}${row+1}!`; }

      const toastColor=result==='cr'?'#33aa33':result==='br'?'#cc3333':result==='sr'?'#7777ff':result==='territory'?'#ccaa22':'#555555';
      return {
        ...prev,
        hitGrid: newHit,
        opponentGrid: newOppGrid,
        viewMode: placementMode?'your':'hit',
        activeAction: null,
        actionInput: '',
        actionError: '',
        actionMessage: msg,
        sr, yourGrid, placementMode, placementRemaining,
        log: [{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:msg},...prev.log],
        // If CR/BR found, player places tiles first — AI turn only after placement is done
        turn: prev.aiMode&&!placementMode?'ai':'you',
        pvpPendingPass: prev.pvpMode&&!placementMode,
        pendingToast:{text:msg,color:toastColor},
      };
    });
  },[]);

  // Attack — win condition: your territory vs opponent territory. No tile destruction.
  const submitAttack=useCallback(()=>{
    setGs(prev=>{
      if(prev.playerStunned){
        return {...prev,playerStunned:false,activeAction:null,actionInput:'',actionError:'',
          turn:prev.aiMode?'ai':'you',
          pvpPendingPass:prev.pvpMode,
          log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:'Stunned by EMP — turn lost!'},...prev.log],
          pendingToast:{text:'Stunned! Turn lost.',color:'#ff6600'}};
      }
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12 (e.g. D4)'};
      const {row,col}=coord;
      if(prev.hitGrid[row][col]!==null)
        return {...prev,actionError:`${COLS[col]}${row+1} already targeted.`};
      const playerBase=`${COLS[prev.ssC]}${prev.ssR+1}`;
      const oppCell=prev.opponentGrid[row][col];
      const isTerritory=oppCell&&(oppCell.type==='territory'||oppCell.type==='starting');
      const isStation=oppCell&&oppCell.type==='station';
      const newHit=prev.hitGrid.map(r=>[...r]);
      const who=prev.pvpMode?`p${prev.activePlayer}`:'you';

      // ── Station attack ────────────────────────────────────────────────────────
      if(isStation){
        const defStationSize=countStation(prev.pvpMode?prev.p2.yourGrid:prev.opponentGrid);
        const isStronger=prev.territory>defStationSize;
        if(!isStronger){
          newHit[row][col]={result:'miss'};
          const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — station held! (station: ${defStationSize}, your territory: ${prev.territory})`;
          return {...prev,hitGrid:newHit,
            activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
            log:[{who,text:msg},...prev.log],
            turn:prev.aiMode?'ai':'you',
            pvpPendingPass:prev.pvpMode,
            pendingToast:{text:`Station repelled your attack! Station size: ${defStationSize}`,color:'#009999'}};
        }
        // Destroy station tile — no win condition
        newHit[row][col]={result:'station'};
        const newOppGrid=cloneGrid(prev.opponentGrid);
        newOppGrid[row][col]=mkCell('empty');
        if(prev.pvpMode){
          const newP2YG=cloneGrid(prev.p2.yourGrid);
          newP2YG[row][col]=mkCell('empty');
          const newP2={...prev.p2,yourGrid:newP2YG};
          const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — station tile destroyed! (station now: ${defStationSize-1})`;
          return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,p2:newP2,
            activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
            log:[{who,text:msg},...prev.log],
            pvpPendingPass:true,
            pendingToast:{text:`Station tile destroyed! Opponent station: ${defStationSize-1}`,color:'#00aacc'}};
        }
        const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — opponent station tile destroyed!`;
        return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,
          activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
          log:[{who:'you',text:msg},...prev.log],
          turn:'ai',
          pendingToast:{text:'Station tile destroyed!',color:'#00aacc'}};
      }

      // ── No target ─────────────────────────────────────────────────────────────
      if(!isTerritory){
        newHit[row][col]={result:'miss'};
        const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — no territory here, miss.`;
        return {...prev,hitGrid:newHit,
          activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
          log:[{who,text:msg},...prev.log],
          turn:prev.aiMode?'ai':'you',
          pvpPendingPass:prev.pvpMode,
          pendingToast:{text:'Attack: no territory there.',color:'#555555'}};
      }

      // ── Territory attack — pure win condition, no tile destruction ───────────
      // Shields and indestructibility are irrelevant — this is a territory battle.
      const oppTerritory=prev.pvpMode?prev.p2.territory:prev.aiTerritory;
      const isStronger=prev.territory>oppTerritory;
      newHit[row][col]={result:isStronger?'territory':'miss'};

      if(isStronger){
        // YOU WIN — your territory overwhelms theirs
        const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — your territory (${prev.territory}) overwhelms opponent (${oppTerritory})! VICTORY!`;
        if(prev.pvpMode){
          return {...prev,hitGrid:newHit,
            activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
            gameOver:true,winner:who,
            log:[{who,text:msg},...prev.log],
            pvpPendingPass:false,
            pendingToast:{text:`Player ${prev.activePlayer} wins — territory superiority!`,color:'#44ff44'}};
        }
        return {...prev,hitGrid:newHit,
          activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
          gameOver:true,winner:'you',
          log:[{who:'you',text:msg},...prev.log],
          turn:'you',
          pendingToast:{text:'ATTACK! Territory superior — YOU WIN!',color:'#44ff44'}};
      } else {
        // THEY WIN — opponent territory holds, you are defeated
        const loserWinner=prev.pvpMode?(prev.activePlayer===1?'p2':'p1'):'ai';
        const msg=`Attack from ${playerBase} → ${COLS[col]}${row+1} — opponent's territory (${oppTerritory}) repels yours (${prev.territory})! DEFEATED!`;
        if(prev.pvpMode){
          return {...prev,hitGrid:newHit,
            activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
            gameOver:true,winner:loserWinner,
            log:[{who,text:msg},...prev.log],
            pvpPendingPass:false,
            pendingToast:{text:`Player ${prev.activePlayer} loses — attack repelled!`,color:'#cc4444'}};
        }
        return {...prev,hitGrid:newHit,
          activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
          gameOver:true,winner:'ai',
          log:[{who:'you',text:msg},...prev.log],
          turn:'you',
          pendingToast:{text:'Attack repelled — DEFEAT!',color:'#cc4444'}};
      }
    });
  },[]);

  // Shop
  const buyItem=useCallback((item)=>{
    setGs(prev=>{
      if(prev.sr<item.cost) return prev;
      return {
        ...prev,
        sr: prev.sr-item.cost,
        inventory: [...prev.inventory,{...item,iid:Date.now()+Math.random()}],
        shopOpen: false,
        pendingToast:{text:`Bought ${item.name}!`,color:'#aaaa44'},
      };
    });
  },[]);

  const selectItem=useCallback((iid)=>{
    setGs(prev=>{
      const sel=prev.selectedItem===iid?null:iid;
      const item=prev.inventory.find(i=>i.iid===iid);
      return {...prev,selectedItem:sel,
        pendingToast:sel?{text:`${item?.name} selected`,color:'#8888ff'}:{text:'Item deselected',color:'#555555'}};
    });
  },[]);

  const useItem=useCallback(()=>{
    setGs(prev=>{
      const item=prev.inventory.find(i=>i.iid===prev.selectedItem);
      if(!item) return prev;
      const consume=inv=>inv.filter(i=>i.iid!==item.iid);
      switch(item.id){
        case 'emp':
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            ...(prev.pvpMode
              ?{opponentStunned:true,
                log:[{who:`p${prev.activePlayer}`,text:'Used EMP — opponent stunned next turn! Bonus move!'},...prev.log],
                pendingToast:{text:'EMP fired! Opponent stunned. Bonus move!',color:'#ffaa00'}}
              :{aiStunned:true,
                log:[{who:'you',text:'Used EMP — AI stunned for 1 turn! Bonus move granted.'},...prev.log],
                pendingToast:{text:'EMP fired! AI skips next turn. Bonus move!',color:'#ffaa00'}})};
        case 'shield':
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            shieldMode:true,viewMode:'your',
            pendingToast:{text:'Shield: click a territory tile on your grid to protect it',color:'#55aaff'}};
        case 'station': {
          const stCnt=countStation(prev.yourGrid);
          if(stCnt>=7) return {...prev,pendingToast:{text:'Station is at max size (7 tiles)!',color:'#ff4444'}};
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            stationMode:true,viewMode:'your',
            pendingToast:{text:'Space Station: click any empty cell to place a station tile',color:'#00aacc'}};
        }
        case 'addroot':
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            rerootMode:true,viewMode:'your',
            pendingToast:{text:'Add Root: click any territory or station tile to add it as an extra root',color:'#22aa55'}};
        case 'pirates': {
          if(prev.pvpMode){
            const newTerr=Math.max(0,prev.p2.territory-1);
            const won=newTerr===0;
            return {...prev,inventory:consume(prev.inventory),selectedItem:null,
              p2:{...prev.p2,territory:newTerr},
              gameOver:won,winner:won?`p${prev.activePlayer}`:prev.winner,
              pvpPendingPass:!won,
              log:[{who:`p${prev.activePlayer}`,text:`Used Pirates — stole 1 territory! Opponent: ${newTerr}${won?' — DEFEATED!':''}`},...prev.log],
              pendingToast:{text:won?'Pirates! Opponent defeated — YOU WIN!':`Pirates! Opponent territory: ${newTerr}`,color:'#aa6600'}};
          }
          const newTerr=Math.max(0,prev.aiTerritory-1);
          const won=newTerr===0;
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            aiTerritory:newTerr,gameOver:won,winner:won?'you':prev.winner,
            turn:won?'you':'ai',
            log:[{who:'you',text:`Used Pirates — stole 1 AI territory! AI territory: ${newTerr}${won?' — AI DEFEATED!':''}`},...prev.log],
            pendingToast:{text:won?'Pirates! AI has no territory — YOU WIN!':`Pirates! AI territory now: ${newTerr}`,color:'#aa6600'}};
        }
        case 'laser':
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            activeAction:'laser',viewMode:'hit',
            pendingToast:{text:'Laser armed — pick a target coordinate',color:'#ff4488'}};
        case 'torpedo':
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            activeAction:'torpedo',viewMode:'hit',
            pendingToast:{text:'Torpedo armed — pick blast center coordinate',color:'#8855ff'}};
        case 'probe': {
          // Scan opponent grid for uncollected resources
          const oppGrid=prev.opponentGrid;
          const brList=[],srList=[],crList=[];
          for(let r=0;r<12;r++) for(let c=0;c<12;c++){
            const cell=oppGrid[r][c];
            if(cell.type==='br') brList.push([r,c]);
            else if(cell.type==='sr_res') srList.push([r,c]);
            else if(cell.type==='cr') crList.push([r,c]);
          }
          const pick=arr=>arr.length?arr[Math.floor(Math.random()*arr.length)]:null;
          let results=[];
          const hasBR=brList.length>0;
          if(hasBR){
            const br=pick(brList); if(br) results.push(`BR at ${COLS[br[1]]}${br[0]+1}`);
            const sr=pick(srList); if(sr) results.push(`SR at ${COLS[sr[1]]}${sr[0]+1}`);
            const cr=pick(crList); if(cr) results.push(`CR at ${COLS[cr[1]]}${cr[0]+1}`);
          } else {
            // No BR — BR slot becomes SR, CR slot stays CR → 2 SR + 1 CR
            const shuffled=[...srList].sort(()=>Math.random()-0.5).slice(0,2);
            shuffled.forEach(([r,c])=>results.push(`SR at ${COLS[c]}${r+1}`));
            const cr=pick(crList); if(cr) results.push(`CR at ${COLS[cr[1]]}${cr[0]+1}`);
            if(!results.length) results.push('no resources detected');
          }
          const msg=`Resource Probe: ${results.join(' | ')}${hasBR?'':' (no BR on grid)'}`;
          const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            turn:prev.aiMode?'ai':'you',
            pvpPendingPass:prev.pvpMode,
            log:[{who,text:msg},...prev.log],
            pendingToast:{text:msg,color:'#aa88ff'}};
        }
        default:
          return {...prev,pendingToast:{text:'Effect coming soon',color:'#555555'}};
      }
    });
  },[]);

  // Place a station tile anywhere on empty grid
  const placeStation=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.stationMode) return prev;
      if(prev.yourGrid[r][c].type!=='empty') return {...prev,pendingToast:{text:'Must place on an empty cell',color:'#ff4444'}};
      const g=cloneGrid(prev.yourGrid);
      g[r][c]=mkCell('station');
      // Collect adjacent CRs (grants placementRemaining)
      const toCollect=autoExpandCRs(g);
      toCollect.forEach(([cr,cc])=>{ g[cr][cc]={...g[cr][cc],collected:true}; });
      const bonusTiles=toCollect.length;
      // Sync p2 opponent grid in pvp
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2OppGrid=prev.p2.opponentGrid.map(row=>row.map(cell=>({...cell})));
        p2OppGrid[r][c]={...p2OppGrid[r][c],type:'station'};
        toCollect.forEach(([cr,cc])=>{
          if(p2OppGrid[cr][cc].type==='cr'&&!p2OppGrid[cr][cc].collected)
            p2OppGrid[cr][cc]={...p2OppGrid[cr][cc],collected:true};
        });
        newP2={...prev.p2,opponentGrid:p2OppGrid};
      }
      const stationSize=countStation(g);
      const toastTxt=bonusTiles>0
        ?`Station placed! CR adjacent — ${bonusTiles} territory tile${bonusTiles!==1?'s':''} to place.`
        :`Station tile placed! Station size: ${stationSize}`;
      return {...prev,yourGrid:g,p2:newP2,stationMode:false,
        placementMode:bonusTiles>0,placementRemaining:(prev.placementRemaining||0)+bonusTiles,
        viewMode:bonusTiles>0?'your':prev.viewMode,
        turn:prev.aiMode&&!bonusTiles?'ai':'you',
        pvpPendingPass:prev.pvpMode&&!bonusTiles,
        pendingToast:{text:toastTxt,color:'#00aacc'}};
    });
  },[]);

  const cancelStation=useCallback(()=>{
    setGs(prev=>({...prev,stationMode:false,
      pendingToast:{text:'Space Station cancelled',color:'#555555'}}));
  },[]);

  // Add Root: add an extra starting tile (old root stays, new tile becomes ALSO a starting tile)
  const applyReroot=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.rerootMode) return prev;
      const cell=prev.yourGrid[r][c];
      if(cell.type!=='territory'&&cell.type!=='station')
        return {...prev,pendingToast:{text:'Can only Add Root to a territory or station tile',color:'#ff4444'}};
      const g=cloneGrid(prev.yourGrid);
      // Old starting tile STAYS as 'starting' — we are ADDING a root, not moving one
      g[r][c]=mkCell('starting');
      // Prune now BFS from all starting tiles (original + new one)
      const {grid:pruned,removed}=pruneDisconnected(g,prev.ssR,prev.ssC);
      const newTerritory=prev.territory-(removed>0?removed:0);
      // Sync p2 opponent grid
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2OppGrid=prev.p2.opponentGrid.map(row=>row.map(cell2=>({...cell2})));
        p2OppGrid[r][c]=mkCell('starting');
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(pruned[pr][pc].type==='empty'&&p2OppGrid[pr][pc].type==='territory')
            p2OppGrid[pr][pc]=mkCell('empty');
        }
        newP2={...prev.p2,opponentGrid:p2OppGrid};
      }
      const pruneNote=removed>0?` ${removed} disconnected tile${removed!==1?'s':''} terminated.`:'';
      return {...prev,yourGrid:pruned,territory:Math.max(1,newTerritory),
        p2:newP2,rerootMode:false,
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        pendingToast:{text:`Added root at ${COLS[c]}${r+1}.${pruneNote}`,color:'#22aa55'},
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',
          text:`Used Add Root — extra root placed at ${COLS[c]}${r+1}.${pruneNote}`},...prev.log]};
    });
  },[]);

  const cancelReroot=useCallback(()=>{
    setGs(prev=>({...prev,rerootMode:false,
      pendingToast:{text:'Add Root cancelled',color:'#555555'}}));
  },[]);

  const applyShield=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.shieldMode) return prev;
      const cell=prev.yourGrid[r][c];
      if(cell.type!=='territory'&&cell.type!=='starting'&&cell.type!=='station')
        return {...prev,pendingToast:{text:'Can only shield territory or station tiles',color:'#ff4444'}};
      if(prev.shieldedCells.some(s=>s.r===r&&s.c===c))
        return {...prev,pendingToast:{text:'Already shielded',color:'#ff4444'}};
      return {...prev,shieldedCells:[...prev.shieldedCells,{r,c}],shieldMode:false,
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        pendingToast:{text:`${COLS[c]}${r+1} is now shielded!`,color:'#55aaff'}};
    });
  },[]);

  const cancelShield=useCallback(()=>{
    setGs(prev=>({...prev,shieldMode:false,
      pendingToast:{text:'Shield cancelled',color:'#555555'}}));
  },[]);

  const submitLaser=useCallback(()=>{
    setGs(prev=>{
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12'};
      const {row,col}=coord;
      const alreadyHit=prev.hitGrid[row][col];
      const oppCell=prev.opponentGrid[row][col];
      if(alreadyHit&&alreadyHit.result!=='territory') return {...prev,actionError:`${COLS[col]}${row+1} already resolved.`};
      if(alreadyHit&&alreadyHit.result==='territory'&&oppCell.type==='empty') return {...prev,actionError:`${COLS[col]}${row+1} already destroyed.`};
      const result=alreadyHit?'territory':
        oppCell.type==='cr'&&!oppCell.collected?'cr':
        oppCell.type==='br'&&!oppCell.collected?'br':
        oppCell.type==='sr_res'&&!oppCell.collected?'sr':
        (oppCell.type==='starting'||oppCell.type==='territory')?'territory':
        oppCell.type==='station'?'station':'miss';
      const newHit=prev.hitGrid.map(r=>[...r]);
      newHit[row][col]={result};
      let newOppGrid=cloneGrid(prev.opponentGrid);
      if(!alreadyHit&&(result==='cr'||result==='br'||result==='sr'))
        newOppGrid[row][col]={...newOppGrid[row][col],type:'empty',collected:true};
      const isHome=oppCell.type==='starting';
      if(result==='territory'&&!isHome) newOppGrid[row][col]=mkCell('empty');
      if(result==='station') newOppGrid[row][col]=mkCell('empty'); // laser always destroys station
      let {sr,placementMode,placementRemaining}=prev;
      let pruneMsg='';
      // Run disconnection pruning if territory tile was destroyed
      if(result==='territory'&&!isHome){
        const ssR2=prev.pvpMode?prev.p2.ssR:prev.opponentSsR;
        const ssC2=prev.pvpMode?prev.p2.ssC:prev.opponentSsC;
        const {grid:pruned,removed}=pruneDisconnected(newOppGrid,ssR2,ssC2);
        newOppGrid=pruned;
        if(removed>0) pruneMsg=` +${removed} disconnected tile${removed!==1?'s':''} terminated!`;
        if(prev.pvpMode&&removed>0){
          // sync p2.yourGrid
        }
      }
      // PvP p2 grid sync
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const newP2YG=cloneGrid(prev.p2.yourGrid);
        if(result==='territory'&&!isHome) newP2YG[row][col]=mkCell('empty');
        if(result==='station') newP2YG[row][col]=mkCell('empty');
        // sync pruned tiles
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='empty'&&newP2YG[pr][pc].type==='territory')
            newP2YG[pr][pc]=mkCell('empty');
        }
        // recalculate p2 territory from grid
        let p2Terr=0;
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='starting') p2Terr++;
        }
        newP2={...prev.p2,yourGrid:newP2YG,territory:p2Terr};
      }
      let msg;
      if(result==='cr'){placementMode=true;placementRemaining+=1;msg=`Laser: CR at ${COLS[col]}${row+1}! Place 1 tile.`;}
      else if(result==='br'){placementMode=true;placementRemaining+=5;msg=`Laser: BR at ${COLS[col]}${row+1}! Place 5 tiles.`;}
      else if(result==='sr'){sr+=1;msg=`Laser: SR at ${COLS[col]}${row+1}! SR +1.`;}
      else if(result==='territory') msg=`Laser: ${isHome?'hit opponent base — indestructible':'destroyed territory'} at ${COLS[col]}${row+1}!${pruneMsg}`;
      else if(result==='station') msg=`Laser: obliterated station tile at ${COLS[col]}${row+1}!`;
      else msg=`Laser: miss at ${COLS[col]}${row+1}.`;
      const playerBase=`${COLS[prev.ssC]}${prev.ssR+1}`;
      const logMsg=`${msg} (fired from ${playerBase})`;
      const tc=result==='cr'?'#33aa33':result==='br'?'#cc3333':result==='sr'?'#7777ff':result==='territory'?'#ff4488':result==='station'?'#00aacc':'#555555';
      return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,p2:newP2,
        activeAction:null,actionInput:'',actionError:'',actionMessage:logMsg,
        sr,placementMode,placementRemaining,
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:logMsg},...prev.log],
        // Laser may collect CR/BR — player places tiles first, then AI's turn
        turn:prev.aiMode&&!placementMode?'ai':'you',
        pvpPendingPass:prev.pvpMode&&!placementMode,
        pendingToast:{text:msg,color:tc}};
    });
  },[]);

  const submitTorpedo=useCallback(()=>{
    setGs(prev=>{
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12'};
      const {row:cr,col:cc}=coord;
      let newHit=prev.hitGrid.map(r=>[...r]);
      let newOppGrid=cloneGrid(prev.opponentGrid);
      let {sr,placementMode,placementRemaining}=prev;
      const hits=[];
      let won=false;
      // Check center for instant win
      if(newHit[cr][cc]===null){
        const centerCell=newOppGrid[cr][cc];
        if(centerCell.type==='territory'||centerCell.type==='starting'){
          newHit[cr][cc]={result:'territory'};
          won=true;
        }
      }
      if(!won){
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
          const tr=cr+dr,tc2=cc+dc;
          const isCenter=dr===0&&dc===0;
          if(!inBounds(tr,tc2)||newHit[tr][tc2]!==null) continue;
          const oppCell=newOppGrid[tr][tc2];
          const result=
            oppCell.type==='cr'&&!oppCell.collected?'cr':
            oppCell.type==='br'&&!oppCell.collected?'br':
            oppCell.type==='sr_res'&&!oppCell.collected?'sr':
            (oppCell.type==='starting'||oppCell.type==='territory')?'territory':
            oppCell.type==='station'?'station':'miss';
          newHit[tr][tc2]={result};
          if(result==='cr'||result==='br'||result==='sr')
            newOppGrid[tr][tc2]={...newOppGrid[tr][tc2],type:'empty',collected:true};
          if(!isCenter&&result==='territory'&&oppCell.type!=='starting')
            newOppGrid[tr][tc2]=mkCell('empty');
          if(!isCenter&&result==='station')
            newOppGrid[tr][tc2]=mkCell('empty'); // torpedo outer ring destroys station tiles
          if(result==='cr'){placementMode=true;placementRemaining+=1;}
          if(result==='br'){placementMode=true;placementRemaining+=5;}
          if(result==='sr') sr+=1;
          if(result!=='miss') hits.push(`${COLS[tc2]}${tr+1}`);
        }
        // Disconnection pruning on opponent grid
        const ssR2=prev.pvpMode?prev.p2.ssR:prev.opponentSsR;
        const ssC2=prev.pvpMode?prev.p2.ssC:prev.opponentSsC;
        const {grid:prunedOpp,removed:torpPruned}=pruneDisconnected(newOppGrid,ssR2,ssC2);
        newOppGrid=prunedOpp;
        if(torpPruned>0) hits.push(`[+${torpPruned} disconnected]`);
      }
      // PvP p2 grid sync
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2&&!won){
        const newP2YG=cloneGrid(prev.p2.yourGrid);
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='empty'&&(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='station'))
            newP2YG[pr][pc]=mkCell('empty');
        }
        let p2Terr=0;
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='starting') p2Terr++;
        }
        newP2={...prev.p2,yourGrid:newP2YG,territory:p2Terr};
      }
      const playerBase=`${COLS[prev.ssC]}${prev.ssR+1}`;
      const msg=won
        ?`Torpedo from ${playerBase} — center hit enemy territory at ${COLS[cc]}${cr+1}! YOU WIN!`
        :`Torpedo from ${playerBase} at ${COLS[cc]}${cr+1}! Hits: ${hits.length?hits.join(', '):'none'}.`;
      const torpWinner=prev.pvpMode?`p${prev.activePlayer}`:'you';
      return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,p2:newP2,
        activeAction:null,actionInput:'',actionError:'',actionMessage:msg,
        sr,placementMode,placementRemaining,
        gameOver:won,winner:won?torpWinner:prev.winner,
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:msg},...prev.log],
        // Torpedo may collect CR/BR — player places tiles first, then AI's turn
        turn:prev.aiMode&&!won&&!placementMode?'ai':'you',
        pvpPendingPass:prev.pvpMode&&!won&&!placementMode,
        pendingToast:{text:won?`TORPEDO WIN! ${prev.pvpMode?`Player ${prev.activePlayer} wins!`:'YOU WIN!'}`:msg,color:won?'#44ff44':'#8855ff'}};
    });
  },[]);

  const set_=(k,v)=>setGs(p=>({...p,...(typeof k==='string'?{[k]:v}:k)}));
  const openAction=t=>{
    const next=gs.activeAction===t?null:t;
    set_({activeAction:next,actionInput:'',actionError:'',actionMessage:'',
      pendingToast:next?{text:`${next==='search'?'Search':'Attack'} mode`,color:'#667788'}:{text:'Action cancelled',color:'#444444'}});
  };
  const closeAction=()=>set_({activeAction:null,actionInput:'',actionError:'',pendingToast:{text:'Action cancelled',color:'#444444'}});
  const onInput=v=>set_({actionInput:v.toUpperCase(),actionError:''});
  const onKey=e=>{
    if(e.key==='Enter'){
      if(gs.activeAction==='search') submitSearch();
      else if(gs.activeAction==='attack') submitAttack();
      else if(gs.activeAction==='laser') submitLaser();
      else if(gs.activeAction==='torpedo') submitTorpedo();
    }
    if(e.key==='Escape') closeAction();
  };

  const vp=gs.placementMode?validPlacements(gs.yourGrid):new Set();

  // Fog of war: each territory/starting/station tile reveals a 5×5 area on YOUR grid
  const visibleCells=(()=>{
    const vis=new Set();
    const g=gs.yourGrid;
    for(let r=0;r<12;r++) for(let c=0;c<12;c++){
      const t=g[r][c].type;
      if(t==='territory'||t==='starting'||t==='station'){
        for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<12&&nc>=0&&nc<12) vis.add(nr*12+nc);
        }
      }
    }
    return vis;
  })();

  // ── Cell Renderers ──────────────────────────────────────────────────────────

  function renderYour(cell,r,c){
    const key=`${r},${c}`;
    const isValid=gs.placementMode&&vp.has(key);
    const isHovered=gs.placementMode&&hoverCell&&hoverCell.r===r&&hoverCell.c===c;
    const mEnter=gs.placementMode?{onMouseEnter:()=>setHoverCell({r,c})}:{};

    if(gs.stationMode){
      // New station mode: place on any empty cell
      if(cell.type==='empty') return(
        <div key={c} className="cell c-station-place" onClick={()=>placeStation(r,c)} title={`${COLS[c]}${r+1} — place station tile here`}>
          <span style={{color:'#009999',fontSize:13,lineHeight:1,opacity:.6}}>◈</span>
        </div>
      );
    }

    if(gs.rerootMode){
      if(cell.type==='territory'||cell.type==='station') return(
        <div key={c} className="cell c-reroot-pick" onClick={()=>applyReroot(r,c)} title={`${COLS[c]}${r+1} — add as extra root`}>
          <span style={{color:'#22cc55',fontSize:14,lineHeight:1}}>★</span>
        </div>
      );
    }

    if(gs.shieldMode&&(cell.type==='territory'||cell.type==='starting'||cell.type==='station')){
      const alreadyShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
      return(
        <div key={c} className="cell" style={{background:'#081828',borderColor:'#2266cc',cursor:alreadyShielded?'not-allowed':'pointer'}}
          onClick={alreadyShielded?undefined:()=>applyShield(r,c)}
          title={alreadyShielded?`${COLS[c]}${r+1} — already shielded`:`${COLS[c]}${r+1} — click to shield`}>
          <span style={{fontSize:13,lineHeight:1}}>{alreadyShielded?'🛡':'🔲'}</span>
        </div>
      );
    }

    if(isHovered){
      return(
        <div key={c} className={`cell ${isValid?'c-ghost-valid':'c-ghost-invalid'}`}
          onClick={isValid?()=>placeTile(r,c):undefined}
          title={`${COLS[c]}${r+1}`} {...mEnter}>
          <span style={{color:isValid?'#ffee00':'#332200',fontSize:20,lineHeight:1}}>◆</span>
        </div>
      );
    }

    if(isValid) return(
      <div key={c} className="cell c-valid" onClick={()=>placeTile(r,c)} title={`${COLS[c]}${r+1}`} {...mEnter}/>
    );

    // Fog: hide cells outside territory vision range
    if(!visibleCells.has(r*12+c)){
      return <div key={c} className="cell c-fog" title={`${COLS[c]}${r+1}`} {...mEnter}/>;
    }

    let cls='cell ';
    let inner=null;
    switch(cell.type){
      case 'starting': {
        const sShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-starting';
        inner=<><span className="cell-icon" style={{color:'#ffe066',fontSize:15}}>★</span>{sShielded&&<span style={{fontSize:7,position:'absolute',bottom:1,right:2,color:'#55aaff'}}>🛡</span>}</>;
        break;
      }
      case 'territory': {
        const tShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-territory';
        inner=tShielded?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>:null;
        break;
      }
      case 'cr':
        cls+='c-cr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a3a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#33aa33'}}>◆</span>;
        break;
      case 'br':
        cls+='c-br'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#3a1a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#cc3333'}}>◆</span>;
        break;
      case 'sr_res':
        cls+='c-srr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a1a3a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#3333cc'}}>◆</span>;
        break;
      case 'station': {
        const stShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-station';
        inner=stShielded
          ?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>
          :<span style={{color:'#00cccc',fontSize:13,lineHeight:1}}>◈</span>;
        break;
      }
      default:
        cls+='c-empty';
    }
    return <div key={c} className={cls} title={`${COLS[c]}${r+1}`} {...mEnter}>{inner}</div>;
  }

  function renderHit(cell,r,c){
    if(!cell) return <div key={c} className="cell c-hit-blank" title={`${COLS[c]}${r+1}`}/>;
    if(cell.result==='miss') return <div key={c} className="cell c-hit-miss" title={`${COLS[c]}${r+1}`}/>;
    const map={
      cr:       {cls:'c-hit-cr',  xc:'#44cc44', lbl:'CR'},
      br:       {cls:'c-hit-br',  xc:'#cc4444', lbl:'BR'},
      sr:       {cls:'c-hit-sr',  xc:'#4444cc', lbl:'SR'},
      territory:{cls:'c-hit-ter', xc:'#ccaa22', lbl:'Terr.'},
      station:  {cls:'c-hit-ter', xc:'#00aacc', lbl:'Stn.'},
    };
    const {cls,xc,lbl}=map[cell.result]||{cls:'c-hit-miss',xc:'#444',lbl:''};
    return(
      <div key={c} className={`cell ${cls}`} title={`${COLS[c]}${r+1}`}>
        <span style={{color:xc,fontSize:18,lineHeight:1}}>◆</span>
        <span style={{fontSize:7,color:'rgba(255,255,255,.5)',lineHeight:1,marginTop:1}}>{lbl}</span>
      </div>
    );
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  const selInvItem=gs.inventory.find(i=>i.iid===gs.selectedItem);

  if(phase==='loading') return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:32,letterSpacing:6}}>It's Just Logic</div>
      <div style={{fontSize:12,color:'#333',letterSpacing:4,textTransform:'uppercase'}}>Loading…</div>
    </div>
  );

  if(phase==='difficulty') return(
    <div className="start-screen">
      <div>
        <div className="start-title">It's Just Logic</div>
        <div className="start-sub">Choose difficulty</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'12px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>chooseAi('easy')}>Easy</button>
        <button className="btn-start" onClick={()=>chooseAi('medium')}>Medium</button>
        <button className="btn-start" onClick={()=>chooseAi('hard')}>Hard</button>
        <button style={{marginTop:4,fontSize:11,color:'#444',background:'none',border:'none',cursor:'pointer',letterSpacing:2,textTransform:'uppercase',fontFamily:'inherit'}} onClick={()=>setPhase('start')}>← Back</button>
      </div>
    </div>
  );

  if(phase==='start') return(
    <div className="start-screen">
      <div>
        <div className="start-title">It's Just Logic</div>
        <div className="start-sub">A game of deduction</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'12px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>startGame(false)}>Start 1v0</button>
        <button className="btn-start" onClick={startPvp}>1v1</button>
        <button className="btn-start" onClick={()=>setPhase('difficulty')}>Vs AI</button>
      </div>
    </div>
  );

  if(pvpLoading) return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:28,letterSpacing:6}}>Pass the Device</div>
      <div style={{fontSize:72,fontWeight:'bold',color:'#8888ff',lineHeight:1}}>{pvpCountdown}</div>
      <div style={{fontSize:11,color:'#333',letterSpacing:4,textTransform:'uppercase'}}>Player {gs.activePlayer===1?2:1} — get ready</div>
    </div>
  );

  return(
    <div className="app">
      <div className="main">

        {/* LEFT — GRID */}
        <div className="grid-area">
          <div className="grid-controls">
            <span className="view-title">{gs.viewMode==='your'?'YOUR GRID':'HIT GRID'}</span>
            <button className={`btn btn-view${gs.viewMode==='your'?' on':''}`}
              onClick={()=>set_({viewMode:'your',pendingToast:{text:'Viewing your grid',color:'#557799'}})}>Your Grid</button>
            <button className={`btn btn-view${gs.viewMode==='hit'?' on':''}`}
              onClick={()=>set_({viewMode:'hit',pendingToast:{text:'Viewing hit grid',color:'#557799'}})}>Hit Grid</button>
          </div>

          {(()=>{
            const crFound=gs.hitGrid.flat().filter(c=>c?.result==='cr').length;
            const brFound=gs.hitGrid.flat().filter(c=>c?.result==='br').length;
            const srFound=gs.hitGrid.flat().filter(c=>c?.result==='sr').length;
            return(
              <div className="res-counter">
                <div className={`res-pill res-cr`}><span className="res-pill-lbl">CR</span>{20-crFound}</div>
                <div className={`res-pill res-br`}><span className="res-pill-lbl">BR</span>{2-brFound}</div>
                <div className={`res-pill res-sr`}><span className="res-pill-lbl">SR</span>{10-srFound}</div>
              </div>
            );
          })()}

          <div className="grid-scroll" onMouseLeave={()=>gs.placementMode&&setHoverCell(null)}>
            <div className="grid-wrap">
              <div className="col-labels">
                {COLS.map(l=><div key={l} className="col-lbl">{l}</div>)}
              </div>
              {Array.from({length:12},(_,r)=>(
                <div key={r} className="grid-row">
                  <div className="row-lbl">{r+1}</div>
                  {Array.from({length:12},(_,c)=>
                    gs.viewMode==='your'
                      ?renderYour(gs.yourGrid[r][c],r,c)
                      :renderHit(gs.hitGrid[r][c],r,c)
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* MID PANEL */}
        <div className="mid">
          <div className="mid-head">History</div>
          <div className="log-list">
            {gs.log.length===0
              ?<div className="log-empty">No moves yet</div>
              :gs.log.map((entry,i)=>(
                <div key={i} className={`log-entry ${entry.who==='you'||entry.who==='p1'?'log-you':entry.who==='p2'?'log-p2':'log-opp'}`}>
                  <span className="log-who">{entry.who==='you'?'YOU':entry.who==='p1'?'P1':entry.who==='p2'?'P2':'AI'}</span>
                  {entry.who==='ai'?'made a move.':entry.text}
                </div>
              ))
            }
          </div>
          <div className="notes-wrap">
            <div className="mid-head">Notes</div>
            <textarea className="notes-inp"
              value={notes}
              onChange={e=>setNotes(e.target.value)}
              placeholder="Write notes here…"/>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="right">
          <div className="stat-card">
            <div className="stat-name">Territory</div>
            <div className={`stat-val sv-ter`}>{gs.territory}</div>
          </div>
          <div className="stat-card">
            <div className="stat-name">SR</div>
            <div className={`stat-val sv-sr`}>{gs.sr}</div>
          </div>

          <button className="btn btn-shop" onClick={()=>set_({shopOpen:true,pendingToast:{text:'Shop opened',color:'#aaaa44'}})}>⬡ SHOP</button>

          <div>
            <div className="sec-head">Inventory</div>
            {gs.inventory.length===0
              ?<div className="inv-empty">No items owned</div>
              :gs.inventory.map(item=>(
                <div key={item.iid} className={`inv-item${gs.selectedItem===item.iid?' sel':''}`}>
                  <span className="inv-name">{item.name}</span>
                  <button className={`btn btn-sel${gs.selectedItem===item.iid?' on':''}`}
                    onClick={()=>selectItem(item.iid)}>
                    {gs.selectedItem===item.iid?'Active':'Select'}
                  </button>
                </div>
              ))
            }
          </div>

        </div>
      </div>

      {/* BOTTOM BAR */}
      <div className="bottom">
        {gs.placementMode&&(
          <div className="place-banner">
            Place territory: {gs.placementRemaining} remaining — click a highlighted square
          </div>
        )}
        {selInvItem&&!gs.stationMode&&(
          <div className="sel-banner" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <span style={{fontSize:11}}>
              {selInvItem.name} — {
                selInvItem.id==='emp'?'stuns AI for 1 turn; you get a bonus move.':
                selInvItem.id==='shield'?'click a territory tile on your grid to protect it.':
                selInvItem.id==='station'?`place 1 station tile anywhere on your grid (${countStation(gs.yourGrid)}/7 tiles used).`:
                selInvItem.id==='addroot'?'add an extra root to any territory or station tile.':
                selInvItem.id==='pirates'?'steal 1 territory tile from opponent.':
                selInvItem.id==='laser'?'destroy any tile on either grid.':
                selInvItem.id==='torpedo'?'3×3 blast centered on a coordinate.':
                'choose a target.'
              }
            </span>
            <button className="btn btn-go" style={{padding:'4px 14px',fontSize:12}} onClick={useItem}>Use</button>
          </div>
        )}
        {gs.stationMode&&(
          <div className="place-banner" style={{borderColor:'#009999',color:'#00cccc',display:'flex',alignItems:'center',gap:10}}>
            <span>Space Station: click any empty cell to place a station tile (station: {countStation(gs.yourGrid)}/7)</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelStation}>Cancel</button>
          </div>
        )}
        {gs.rerootMode&&(
          <div className="place-banner" style={{borderColor:'#22aa55',color:'#44cc77',display:'flex',alignItems:'center',gap:10}}>
            <span>Add Root: click any territory or station tile to add it as an extra root</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelReroot}>Cancel</button>
          </div>
        )}
        {gs.shieldMode&&(
          <div className="place-banner" style={{borderColor:'#2266cc',color:'#55aaff',display:'flex',alignItems:'center',gap:10}}>
            <span>Shield: click a territory tile on your grid to protect it</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelShield}>Cancel</button>
          </div>
        )}
        {gs.actionMessage&&!gs.activeAction&&(
          <div className="msg-txt">{gs.actionMessage}</div>
        )}
        <div className="bottom-row">
          {gs.pvpMode&&<span style={{fontSize:'10px',color:'#8888aa',letterSpacing:'1px',textTransform:'uppercase'}}>Player {gs.activePlayer}'s Turn</span>}
          {gs.aiMode&&<span style={{fontSize:'10px',color:'#444',letterSpacing:'1px',textTransform:'uppercase'}}>AI: {gs.aiDifficulty}</span>}
          {gs.aiMode&&gs.turn==='ai'&&(
            <span className="msg-txt" style={{color:'#dd8866'}}>AI is thinking…</span>
          )}
          {phase==='game'&&gs.turn==='you'&&!gs.gameOver&&!gs.pvpMode&&(
            <span style={{fontSize:13,fontWeight:'bold',fontVariantNumeric:'tabular-nums',
              color:timeLeft<=10?'#cc4444':timeLeft<=30?'#ffaa00':'#556677',
              border:'1px solid',borderColor:timeLeft<=10?'#441111':timeLeft<=30?'#443300':'#1a2233',
              borderRadius:4,padding:'2px 8px',background:'#080810'}}>
              {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}
            </span>
          )}
          {gs.pvpMode&&gs.pvpPendingPass&&!gs.gameOver&&(
            <button className="btn-start" style={{fontSize:13,padding:'8px 28px'}} onClick={passPvp}>Pass Device →</button>
          )}
          {!gs.pvpPendingPass&&gs.viewMode==='hit'&&gs.turn==='you'&&<>
          <button className={`btn btn-search${gs.activeAction==='search'?' btn-view on':''}`}
            onClick={()=>openAction('search')}>Search</button>
          <button className={`btn btn-attack${gs.activeAction==='attack'?' btn-view on':''}`}
            onClick={()=>openAction('attack')}>Attack</button>
          </>}
          {gs.aiMode&&<>
            <button className="btn" style={{background:'#081808',borderColor:'#1a4a1a',color:'#44cc44',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,placementMode:true,placementRemaining:(prev.placementRemaining||0)+1,actionMessage:'Cheat: place 1 territory tile.'}))}>
              +1 CR
            </button>
            <button className="btn" style={{background:'#08081e',borderColor:'#1a1a44',color:'#8888ff',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,sr:prev.sr+1}))}>
              +1 SR
            </button>
          </>}

          {!gs.pvpPendingPass&&gs.activeAction&&gs.turn==='you'&&(<>
            <div className="action-form">
              <span className="action-lbl">
                {gs.activeAction==='search'?'Search':gs.activeAction==='attack'?'Attack':gs.activeAction==='laser'?'Laser':'Torpedo'}
              </span>
              <input ref={inputRef} className="coord-inp"
                value={gs.actionInput}
                onChange={e=>onInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="D4" maxLength={3}/>
            </div>
            <button className="btn btn-go"
              onClick={gs.activeAction==='search'?submitSearch:gs.activeAction==='attack'?submitAttack:gs.activeAction==='laser'?submitLaser:submitTorpedo}>Go</button>
            <button className="btn btn-cancel" onClick={closeAction}>✕</button>
            {gs.actionError&&<span className="err-txt">{gs.actionError}</span>}
          </>)}
        </div>
      </div>

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className="toast" style={{borderColor:t.color,borderLeftColor:t.color,borderLeftWidth:3,color:'#eee'}}>{t.text}</div>
        ))}
      </div>

      {/* GAME OVER */}
      {gs.gameOver&&(
        <div className="modal-bg">
          <div className="modal" style={{textAlign:'center',padding:'36px 28px'}}>
            <div style={{fontSize:36,fontWeight:'bold',letterSpacing:3,color:gs.winner==='you'||gs.winner==='p1'||gs.winner==='p2'?'#44cc44':'#cc4444',marginBottom:10}}>
              {gs.winner==='you'?'VICTORY':gs.winner==='p1'?'PLAYER 1 WINS':gs.winner==='p2'?'PLAYER 2 WINS':'DEFEAT'}
            </div>
            <div style={{fontSize:13,color:'#555',marginBottom:28}}>
              {gs.winner==='you'
                ? gs.territory>=21
                  ? 'You dominated the galaxy with 21 territory tiles.'
                  : 'You have annihilated your opponent.'
                : gs.winner==='ai'
                  ? gs.aiTerritory>=21
                    ? 'The AI dominated the galaxy — your territory was overwhelmed.'
                    : 'Your territory has been destroyed.'
                  : gs.winner==='p1'||gs.winner==='p2'
                    ? 'Territorial domination achieved.'
                    : 'Your territory has been destroyed.'}
            </div>
            <button className="btn-start" style={{fontSize:14,padding:'10px 32px'}} onClick={()=>setPhase('start')}>Play Again</button>
          </div>
        </div>
      )}

      {/* SHOP MODAL */}
      {gs.shopOpen&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>
          <div className="modal">
            <div className="modal-hdr">
              <div>
                <div className="modal-title">⬡ SHOP</div>
                <div className="modal-sub">Current SR: {gs.sr}</div>
              </div>
              <button className="modal-close" onClick={()=>set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>✕</button>
            </div>
            {SHOP_ITEMS.map(item=>(
              <div key={item.id} className="shop-item">
                <div className="shop-body">
                  <div className="shop-name">{item.name}</div>
                  <div className="shop-cost">{item.cost} SR</div>
                  <div className="shop-desc">{item.desc}</div>
                </div>
                <button className="btn btn-buy"
                  disabled={gs.sr<item.cost}
                  onClick={()=>buyItem(item)}>BUY</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
